# ZAP vs Firing Range — Local Runner Configuration
#
# Settings here are used by run-firingrange.py.
# All settings can be overridden with command-line arguments:
#   python3 run-firingrange.py --help
#
# Relative paths for output_dir are resolved from the scans/firingrange/ directory.
# Relative paths for dev_build_dir are resolved from the zap-mgmt-scripts/ repo root.

# Output directory for scan results.
# The output/ directory is in .gitignore so results won't be committed.
output_dir = output

# Docker image to use when running in Docker mode.
docker_image = ghcr.io/zaproxy/zaproxy:nightly

# Set to 'true' to run ZAP from a local dev build instead of Docker.
# Requires gradlew to be present in dev_build_dir.
use_dev_build = false

# Path to the zaproxy repository root (used when use_dev_build = true).
# Resolved relative to the zap-mgmt-scripts repo root.
dev_build_dir = ../zaproxy

# Sections to run: 'all' or a comma-separated list.
# Available: address, angular, clickjacking, domxss, escape,
#            leakedcookie, mixedcontent, reflected, remoteinclude, reverseclickjacking
sections = all
