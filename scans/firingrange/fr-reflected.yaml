---
env:
  contexts:
  - name: "Firing Range"
    urls:
    - "https://public-firing-range.appspot.com/reflected/"
    includePaths: []
    excludePaths: []
    authentication:
      parameters: {}
      verification:
        method: "response"
        pollFrequency: 60
        pollUnits: "requests"
    sessionManagement:
      method: "cookie"
      parameters: {}
  configs:
    ptk.automatedScanning.enabled: true
  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true
  vars: {}
jobs:
- name: "add-script"
  type: script
  parameters:
    action: add
    type: standalone
    file: /zap/wrk/firing-range-score.js
- type: spiderClient
  name: "spiderClient"
  parameters: {}
- parameters:
    context: ""
    user: ""
    policy: ""
    maxRuleDurationInMins: 0
    maxScanDurationInMins: 0
  policyDefinition:
    defaultStrength: "medium"
    defaultThreshold: "off"
    rules:
    - id: 40012
      name: "Cross Site Scripting (Reflected)"
      threshold: "low"
      strength: "default"
  name: "activeScan"
  type: "activeScan"
- name: "run-script"
  type: script
  parameters:
    action: run
    type: standalone
    name: firing-range-score.js
