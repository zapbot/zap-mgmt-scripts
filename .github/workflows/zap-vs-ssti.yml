name: ZAP vs SSTI

on: 
  schedule:
    - cron:  '0 5 * * *' # 5 am every day
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - name: Clone zap-mgmt-scripts and zaproxy-website
      run: |
        # Setup git details
        export GITHUB_USER=zapbot
        git config --global user.email "12745184+zapbot@users.noreply.github.com"
        git config --global user.name $GITHUB_USER
        git clone https://github.com/$GITHUB_USER/zap-mgmt-scripts.git

        git clone -o upstream https://github.com/zaproxy/zaproxy-website.git
        cd zaproxy-website
        git remote add origin https://$GITHUB_USER:${{ secrets.ZAPBOT_TOKEN }}@github.com/$GITHUB_USER/zaproxy-website.git

    - name: Start V2SSTI
      run: |
        docker run -d -p 127.0.0.1:5000-5100:5000-5100 -p 127.0.0.1:6000-6100:6000-6100 -w /home d10g0mrs/websites_vuln_to_ssti sh ./start_all_services.sh

    - name: Scan V2SSTI
      run: |
        cd zap-mgmt-scripts/scans/ssti
        
        export file=all.yml

        # Need to do this so the zap user in docker can write to the file
        touch $file
        chmod a+w $file
        touch ssti-score.js
        chmod a+w ssti-score.js
        
        chmod +x ssti.sh
        
        docker run -v $(pwd):/zap/wrk/:rw --network="host" ghcr.io/zaproxy/zaproxy:nightly /zap/wrk/ssti.sh
        
        cp $file ../../../zaproxy-website/site/data/scans/ssti/

    - name: Upload results to S3
      continue-on-error: true
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWSCLI_SSP_ACCESS }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWSCLI_SSP_SECRET }}
        AWS_DEFAULT_REGION: us-east-2
      run: |
        pip install pyyaml
        DATE=$(date +%Y-%m-%d)
        python3 zap-mgmt-scripts/scans/yaml_to_jsonl.py $DATE ssti \
          zap-mgmt-scripts/scans/ssti/all.yml \
          | aws s3 cp - s3://ssp-project-zap/scans/raw/ssti/$DATE.jsonl

    - name: Check for regressions
      continue-on-error: true
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWSCLI_SSP_ACCESS }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWSCLI_SSP_SECRET }}
        AWS_DEFAULT_REGION: us-east-2
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        RECENT=$(mktemp -d)
        aws s3 sync s3://ssp-project-zap/scans/raw/ssti/ "$RECENT/"
        python3 zap-mgmt-scripts/scans/generate-scan-stats.py \
          --data-dir "$RECENT" \
          --output-dir "$(mktemp -d)" \
          --days 1 \
          --compare-days 7 \
          --scan ssti \
          --slack-webhook "$SLACK_WEBHOOK_URL"

    - name: Raise a PR on the website
      run: |
        cd zaproxy-website

        BRANCH="ssti"
        git checkout -b $BRANCH

        # Update the index to be sure git is aware of changes
        git update-index -q --refresh
        ## If there are changes: comment, commit, PR
        if ! git diff-index --quiet HEAD --; then
          echo ${{ secrets.ZAPBOT_TOKEN }} | gh auth login --with-token
          gh repo set-default zaproxy/zaproxy-website
          git add site/data/scans/ssti/*
          git commit -sm "Updated Vuln to SSTI Results"
          git push -u origin $BRANCH -f
          gh pr create --fill || true
        fi

    - name: Notify Slack on scan failure
      if: failure()
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        if [ -n "$SLACK_WEBHOOK_URL" ]; then
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\": \"❌ ZAP vs Vuln to SSTI scan failed: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        fi
