name: ZAP vs Firing Range

on: 
  schedule:
    - cron:  '0 2 * * *' # 2 am every day
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - name: Clone zap-mgmt-scripts and zaproxy-website
      run: |
        # Setup git details
        export GITHUB_USER=zapbot
        git config --global user.email "12745184+zapbot@users.noreply.github.com"
        git config --global user.name $GITHUB_USER
        git clone https://github.com/$GITHUB_USER/zap-mgmt-scripts.git

        git clone -o upstream https://github.com/zaproxy/zaproxy-website.git
        cd zaproxy-website
        git remote add origin https://$GITHUB_USER:${{ secrets.ZAPBOT_TOKEN }}@github.com/$GITHUB_USER/zaproxy-website.git

    - name: Scan Firing Range
      run: |
        cd zap-mgmt-scripts/scans/firingrange
        sections=( "address" "angular" "dom" "escape" "mixedcontent" "reflected" "remoteinclude" "reverseclickjacking" "leakedcookie" "clickjacking" "urldom")
        for s in "${sections[@]}"
        do
          cat fr-$s.js firing-range-score-main.js  > firing-range-score.js

          touch $s.yml
          chmod go+w $s.yml
        
          docker run -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:nightly zap.sh -cmd -silent -autorun /zap/wrk/fr-$s.yaml
        
          cp $s.yml ../../../zaproxy-website/site/data/scans/firingrange/
        done

    - name: Upload results to S3
      continue-on-error: true
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWSCLI_SSP_ACCESS }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWSCLI_SSP_SECRET }}
        AWS_DEFAULT_REGION: us-east-2
      run: |
        pip install pyyaml
        DATE=$(date +%Y-%m-%d)
        SRC=zap-mgmt-scripts/scans/firingrange
        python3 zap-mgmt-scripts/scans/yaml_to_jsonl.py $DATE firingrange \
          $SRC/address.yml $SRC/angular.yml $SRC/dom.yml $SRC/escape.yml \
          $SRC/mixedcontent.yml $SRC/reflected.yml $SRC/remoteinclude.yml \
          $SRC/reverseclickjacking.yml $SRC/leakedcookie.yml \
          $SRC/clickjacking.yml $SRC/urldom.yml \
          | aws s3 cp - s3://ssp-project-zap/scans/raw/firingrange/$DATE.jsonl

    - name: Raise a PR on the website
      run: |
        cd zaproxy-website

        BRANCH="firingrange"
        git checkout -b $BRANCH

        # Update the index to be sure git is aware of changes
        git update-index -q --refresh
        ## If there are changes: comment, commit, PR
        if ! git diff-index --quiet HEAD --; then
          echo ${{ secrets.ZAPBOT_TOKEN }} | gh auth login --with-token
          gh repo set-default zaproxy/zaproxy-website
          git add site/data/scans/firingrange/*
          git commit -sm "Updated Firing Range Results"
          git push -u origin $BRANCH -f
          gh pr create --fill || true
        fi
