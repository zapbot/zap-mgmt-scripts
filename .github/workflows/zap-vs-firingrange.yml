name: ZAP vs Firing Range

on: 
  schedule:
    - cron:  '0 2 * * *' # 2 am every day
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - name: Clone zap-mgmt-scripts
      run: |
        export GITHUB_USER=zapbot
        git config --global user.email "12745184+zapbot@users.noreply.github.com"
        git config --global user.name $GITHUB_USER
        git clone https://github.com/$GITHUB_USER/zap-mgmt-scripts.git

    - name: Scan Firing Range
      run: |
        cd zap-mgmt-scripts/scans/firingrange
        for fr_js in fr-*.js; do
          s="${fr_js#fr-}"
          s="${s%.js}"

          cat $fr_js firing-range-score-main.js > firing-range-score.js

          touch $s.yml
          chmod go+w $s.yml

          docker run -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:nightly zap.sh -cmd -silent -autorun /zap/wrk/fr-$s.yaml
        done

    - name: Upload results to S3
      continue-on-error: true
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWSCLI_SSP_ACCESS }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWSCLI_SSP_SECRET }}
        AWS_DEFAULT_REGION: us-east-2
      run: |
        pip install pyyaml
        DATE=$(date +%Y-%m-%d)
        SRC=zap-mgmt-scripts/scans/firingrange
        YMLS=()
        for f in $SRC/fr-*.js; do
          s=$(basename "$f" .js)
          YMLS+=("$SRC/${s#fr-}.yml")
        done
        python3 zap-mgmt-scripts/scans/yaml_to_jsonl.py $DATE firingrange "${YMLS[@]}" \
          | aws s3 cp - s3://ssp-project-zap/scans/raw/firingrange/$DATE.jsonl

    - name: Check for regressions
      continue-on-error: true
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWSCLI_SSP_ACCESS }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWSCLI_SSP_SECRET }}
        AWS_DEFAULT_REGION: us-east-2
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        RECENT=$(mktemp -d)
        aws s3 sync s3://ssp-project-zap/scans/raw/firingrange/ "$RECENT/"
        python3 zap-mgmt-scripts/scans/generate-scan-stats.py \
          --data-dir "$RECENT" \
          --output-dir "$(mktemp -d)" \
          --days 1 \
          --compare-days 7 \
          --scan firingrange \
          --slack-webhook "$SLACK_WEBHOOK_URL"

    - name: Notify Slack on scan failure
      if: failure()
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        if [ -n "$SLACK_WEBHOOK_URL" ]; then
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\": \"❌ ZAP vs Firing Range scan failed: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
        fi

